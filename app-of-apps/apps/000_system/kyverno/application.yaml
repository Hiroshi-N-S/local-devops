---
# docs:
#   - https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/
#   - https://argo-cd.readthedocs.io/en/stable/user-guide/sync-waves/
#   - https://github.com/argoproj/argo-cd/blob/master/docs/operator-manual/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-kyverno
  namespace: devops-system
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: devops-project
  destination:
    name: in-cluster
    namespace: kyverno-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - chart: kyverno
      repoURL: https://kyverno.github.io/kyverno/
      targetRevision: 3.8.1
      helm:
        valueFiles:
          - $valueFiles/app-of-apps/apps/000_system/kyverno/values.yaml
    - ref: valueFiles
      repoURL: https://github.com/Hiroshi-N-S/local-devops.git
      targetRevision: main

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-kyverno-policies
  namespace: devops-system
  annotations:
    argocd.argoproj.io/sync-wave: "11"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: devops-project
  destination:
    name: in-cluster
    namespace: kyverno-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - path: app-of-apps/apps/000_system/kyverno/manifests
      repoURL: https://github.com/Hiroshi-N-S/local-devops.git
      targetRevision: main
