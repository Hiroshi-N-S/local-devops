---
# docs:
#   - https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/
#   - https://argo-cd.readthedocs.io/en/stable/user-guide/sync-waves/
#   - https://github.com/argoproj/argo-cd/blob/master/docs/operator-manual/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-external-secrets
  namespace: devops-system
  annotations:
    argocd.argoproj.io/sync-wave: "110"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: devops-project
  destination:
    name: in-cluster
    namespace: devops-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - chart: external-secrets
      repoURL: https://charts.external-secrets.io/
      targetRevision: 2.2.0
      helm:
        valueFiles:
          - $valueFiles/app-of-apps/apps/100_security/external-secrets/values.yaml
    - ref: valueFiles
      repoURL: https://github.com/Hiroshi-N-S/local-devops.git
      targetRevision: feat/renovate

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-vault-externalsecrets
  namespace: devops-system
  annotations:
    argocd.argoproj.io/sync-wave: "111"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: devops-project
  destination:
    name: in-cluster
    namespace: devops-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - path: app-of-apps/apps/100_security/external-secrets/manifests
      repoURL: https://github.com/Hiroshi-N-S/local-devops.git
      targetRevision: feat/renovate
